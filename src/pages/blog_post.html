<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$$title</title>
    <link rel="icon" href="/media/icons/blog.svg">
    <link rel="stylesheet" href="/pages/blog_post/style.css"/>
    <template id="content_template">content</template>
</head>
<body>
    <div id="article">
        <img id="thumbnail" src="$$thumbnail" alt="thumbnail">
        <h1 id="title">$$title</h1>
        <em id="description">$$description</em>
        <p id="date">$$date</p>
        <pre id="content">$$content</pre>
    </div>
</body>
</html>
